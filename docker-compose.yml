# docker-compose.yml
#version: '3.8'
services:
  school_mate_app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://school_mate_db:5432/school_mate
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
#      - SPRING_LIQUIBASE_ENABLED=false
      - SPRING_JPA_HIBERNATE_DDL_AUTO=create-drop
    depends_on:
      - school_mate_db
    networks:
      - school-mate-network

  school_mate_db:
    image: postgres:16
    environment:
      - POSTGRES_DB=school_mate
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - school-mate-network

volumes:
  db-data:

networks:
  school-mate-network:
    driver: bridge